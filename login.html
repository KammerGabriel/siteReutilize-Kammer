<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reutilize! - Login</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <h1>Reutilize!</h1>

            <p class="subtitulo">
                Venda • Troca • Doação de Objetos
            </p>

            <form id="formLogin">

                <label>E-mail</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required
                >

                <label>Senha</label>

                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >

                <button type="submit">
                    Entrar
                </button>

            </form>

            <div class="cadastro">

                <p>Ainda não possui uma conta?</p>

                <a href="cadastro.html">
                    Criar Conta
                </a>

            </div>

        </div>

    </div>

    <script src="js/login.js"></script>

</body>
</html>
