<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reutilize! - Criar Conta</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="login-container">

        <div class="login-card">

            <h1>Reutilize!</h1>

            <p class="subtitulo">
                Crie sua conta para anunciar produtos
            </p>

            <form id="formCadastro">

                <label>Nome Completo</label>
                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome completo"
                    required
                >

                <label>E-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required
                >

                <label>Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Crie uma senha"
                    required
                >

                <label>Confirmar Senha</label>
                <input
                    type="password"
                    id="confirmarSenha"
                    placeholder="Digite a senha novamente"
                    required
                >

                <button type="submit">
                    Criar Conta
                </button>

            </form>

            <div class="cadastro">

                <p>Já possui uma conta?</p>

                <a href="login.html">
                    Fazer Login
                </a>

            </div>

        </div>

    </div>

    <script src="js/usuarios.js"></script>

</body>
</html>
